  # ---------------------------------------------------------------------------
  # Shipments
  # ---------------------------------------------------------------------------

  /v1/shipments:
    get:
      operationId: listShipments
      summary: List shipments
      description: Returns a paginated list of all advance ship notice documents visible to the authenticated trading partner.
      tags: [shipments]
