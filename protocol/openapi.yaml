        "200":
          description: Successful response — array of acknowledgment documents.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Acknowledgment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createAcknowledgment
      summary: Create an acknowledgment
      description: Submit a functional acknowledgment for a previously received OCEX document.
      tags: [acknowledgments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Acknowledgment"
      responses:
        "201":
          description: Acknowledgment created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Acknowledgment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
