      responses:
        "201":
          description: Catalog created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Catalog"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/catalogs/{id}:
    get:
      operationId: getCatalog
      summary: Get a single catalog
      description: Returns one catalog document by its unique identifier.
      tags: [catalogs]
      parameters:
        - $ref: "#/components/parameters/idParam"
      responses:
        "200":
          description: Catalog found.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Catalog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
