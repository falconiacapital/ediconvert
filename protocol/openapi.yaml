openapi: "3.1.0"

info:
  title: "OCEX — Open Commerce Exchange Protocol"
  version: "1.0.0"
  description: |
    OCEX (Open Commerce Exchange) replaces legacy EDI with a REST-native protocol
    for B2B supply-chain data exchange. Instead of fixed-width flat files sent over
    AS2 or SFTP, trading partners exchange JSON documents over HTTPS using standard
    HTTP verbs and status codes.

    ## Document types (v1)

    | OCEX type        | EDI equivalent | Description                              |
    |------------------|---------------|------------------------------------------|
    | `invoice`        | 810           | Request for payment from vendor to buyer |
    | `order`          | 850           | Purchase order from buyer to vendor      |
    | `catalog`        | 832           | Price/sales catalog from vendor          |
    | `shipment`       | 856           | Advance ship notice (ASN)                |
    | `acknowledgment` | 997           | Functional acknowledgment                |

    ## Authentication

    Every request must carry an API key in the `X-API-Key` header. Keys are issued
    per trading-partner relationship and scoped to specific document types.

    ## Versioning

    All v1 endpoints are prefixed with `/v1/`. Breaking changes will be introduced
    under a new version prefix (e.g. `/v2/`).

    ## Error format

    All error responses share a consistent envelope:

    ```json
    {
      "error": {
        "code": "VALIDATION_ERROR",
        "message": "Field 'currency' is required for invoices.",
        "location": "body.currency",
        "suggestion": "Add a three-letter ISO 4217 currency code."
      }
    }
    ```

  contact:
    name: "OCEX Protocol Maintainers"
    url: "https://github.com/ocex-protocol/ediconvert"
  license:
    name: "MIT"
    url: "https://opensource.org/licenses/MIT"

servers:
  - url: "http://localhost:3000"
    description: "Default local development gateway"

security:
  - ApiKeyAuth: []

tags:
  - name: invoices
    description: "EDI 810 — Invoice documents"
  - name: orders
    description: "EDI 850 — Purchase order documents"
  - name: catalogs
    description: "EDI 832 — Price/sales catalog documents"
  - name: shipments
    description: "EDI 856 — Advance ship notice documents"
  - name: acknowledgments
    description: "EDI 997 — Functional acknowledgment documents"
  - name: parse
    description: "Parse raw EDI X12 into OCEX JSON"

paths:

  # ---------------------------------------------------------------------------
  # Invoices
  # ---------------------------------------------------------------------------

  /v1/invoices:
    get:
      operationId: listInvoices
      summary: List invoices
      description: Returns a paginated list of all invoice documents visible to the authenticated trading partner.
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Successful response — array of invoice documents.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createInvoice
      summary: Create an invoice
      description: Submit a new invoice document. The gateway validates the payload against the OCEX invoice schema before persisting it.
      tags: [invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Invoice"
      responses:
        "201":
          description: Invoice created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/invoices/{id}:
    get:
      operationId: getInvoice
      summary: Get a single invoice
      description: Returns one invoice document by its unique identifier.
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/idParam"
      responses:
        "200":
          description: Invoice found.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Orders
  # ---------------------------------------------------------------------------

  /v1/orders:
    get:
      operationId: listOrders
      summary: List purchase orders
      description: Returns a paginated list of all purchase order documents visible to the authenticated trading partner.
      tags: [orders]
      parameters:
