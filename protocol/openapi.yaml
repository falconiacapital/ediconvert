        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Successful response — array of order documents.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createOrder
      summary: Create a purchase order
      description: Submit a new purchase order document.
      tags: [orders]
      requestBody:
