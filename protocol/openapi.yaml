        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Order created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/orders/{id}:
    get:
      operationId: getOrder
      summary: Get a single purchase order
      description: Returns one purchase order document by its unique identifier.
      tags: [orders]
      parameters:
        - $ref: "#/components/parameters/idParam"
      responses:
        "200":
          description: Order found.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Catalogs
  # ---------------------------------------------------------------------------

  /v1/catalogs:
    get:
      operationId: listCatalogs
      summary: List catalogs
      description: Returns a paginated list of all catalog documents visible to the authenticated trading partner.
      tags: [catalogs]
      parameters:
