  # ---------------------------------------------------------------------------
  # Acknowledgments
  # ---------------------------------------------------------------------------

  /v1/acknowledgments:
    get:
      operationId: listAcknowledgments
      summary: List acknowledgments
      description: Returns a paginated list of all functional acknowledgment documents visible to the authenticated trading partner.
      tags: [acknowledgments]
      parameters:
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
